<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Studio O.D.D | 포트폴리오 관리</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Noto+Sans+KR:wght@300;400;500;700;900&display=swap" rel="stylesheet">
<style>
:root {
  --black: #0a0a0a; --white: #f5f5f0; --accent: #c8ff00;
  --accent2: #ff4d00; --gray: #141414; --gray2: #222; --muted: #a0a0a0;
  --font-display: 'Bebas Neue', sans-serif;
  --font-body: 'Noto Sans KR', sans-serif;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body { background: var(--black); color: var(--white); font-family: var(--font-body); min-height: 100vh; }

/* LOGIN */
#login-screen {
  min-height: 100vh; display: flex; align-items: center; justify-content: center;
}
.login-box {
  background: var(--gray); border: 1px solid var(--gray2); border-radius: 16px;
  padding: 48px 40px; width: 360px; text-align: center;
}
.login-box h1 { font-family: var(--font-display); font-size: 32px; color: var(--accent); margin-bottom: 8px; }
.login-box p { font-size: 13px; color: var(--muted); margin-bottom: 32px; }
.login-box input {
  width: 100%; padding: 14px 16px; background: var(--black); border: 1px solid var(--gray2);
  border-radius: 8px; color: var(--white); font-family: var(--font-body); font-size: 14px;
  margin-bottom: 12px; outline: none; transition: border-color 0.2s;
}
.login-box input:focus { border-color: var(--accent); }
.btn-login {
  width: 100%; padding: 14px; background: var(--accent); color: var(--black);
  border: none; border-radius: 8px; font-family: var(--font-body); font-size: 15px;
  font-weight: 700; cursor: pointer; transition: opacity 0.2s;
}
.btn-login:hover { opacity: 0.85; }
.login-err { color: var(--accent2); font-size: 13px; margin-top: 10px; display: none; }

/* ADMIN LAYOUT */
#admin-screen { display: none; }
.admin-header {
  background: var(--gray); border-bottom: 1px solid var(--gray2);
  padding: 16px 40px; display: flex; align-items: center; justify-content: space-between;
  position: sticky; top: 0; z-index: 100;
}
.admin-header h1 { font-family: var(--font-display); font-size: 24px; color: var(--white); }
.admin-header h1 span { color: var(--accent); }
.btn-logout {
  font-size: 12px; color: var(--muted); background: none; border: 1px solid var(--gray2);
  padding: 8px 16px; border-radius: 50px; cursor: pointer; transition: all 0.2s;
}
.btn-logout:hover { color: var(--white); border-color: var(--white); }

.admin-body { max-width: 960px; margin: 0 auto; padding: 48px 24px; }

/* FORM CARD */
.form-card {
  background: var(--gray); border: 1px solid var(--gray2); border-radius: 16px; padding: 40px;
  margin-bottom: 48px;
}
.form-card h2 {
  font-family: var(--font-display); font-size: 22px; color: var(--accent);
  margin-bottom: 28px; padding-bottom: 16px; border-bottom: 1px solid var(--gray2);
}
.form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 16px; }
.form-row.full { grid-template-columns: 1fr; }
.form-group { display: flex; flex-direction: column; gap: 8px; }
.form-group label { font-size: 12px; font-weight: 700; color: var(--muted); letter-spacing: 1px; text-transform: uppercase; }
.form-group input,
.form-group select,
.form-group textarea {
  background: var(--black); border: 1px solid var(--gray2); border-radius: 8px;
  color: var(--white); font-family: var(--font-body); font-size: 14px;
  padding: 12px 14px; outline: none; transition: border-color 0.2s;
}
.form-group input:focus,
.form-group select:focus,
.form-group textarea:focus { border-color: var(--accent); }
.form-group textarea { resize: vertical; min-height: 80px; }
.form-group select option { background: var(--black); }

/* 이미지 업로드 */
.upload-zone {
  border: 2px dashed var(--gray2); border-radius: 8px; padding: 32px;
  text-align: center; cursor: pointer; transition: border-color 0.2s, background 0.2s;
  position: relative;
}
.upload-zone:hover, .upload-zone.dragover { border-color: var(--accent); background: rgba(200,255,0,0.03); }
.upload-zone input[type="file"] { position: absolute; inset: 0; opacity: 0; cursor: pointer; }
.upload-zone .upload-icon { font-size: 32px; margin-bottom: 8px; }
.upload-zone p { font-size: 13px; color: var(--muted); }
.upload-zone p span { color: var(--accent); font-weight: 600; }
.upload-preview {
  margin-top: 12px; max-width: 100%; max-height: 200px; border-radius: 6px;
  object-fit: contain; display: none;
}
.upload-progress {
  margin-top: 10px; height: 4px; background: var(--gray2); border-radius: 2px; overflow: hidden; display: none;
}
.upload-progress-bar { height: 100%; background: var(--accent); width: 0%; transition: width 0.3s; }

/* SUBMIT */
.form-actions { display: flex; gap: 12px; margin-top: 28px; padding-top: 24px; border-top: 1px solid var(--gray2); }
.btn-submit {
  flex: 1; padding: 16px; background: var(--accent); color: var(--black);
  border: none; border-radius: 10px; font-family: var(--font-body); font-size: 15px;
  font-weight: 700; cursor: pointer; transition: opacity 0.2s;
}
.btn-submit:hover { opacity: 0.85; }
.btn-submit:disabled { opacity: 0.4; cursor: not-allowed; }
.btn-reset {
  padding: 16px 24px; background: none; color: var(--muted); border: 1px solid var(--gray2);
  border-radius: 10px; font-family: var(--font-body); font-size: 14px; cursor: pointer; transition: all 0.2s;
}
.btn-reset:hover { color: var(--white); border-color: var(--white); }

/* TOAST */
.toast {
  position: fixed; bottom: 32px; left: 50%; transform: translateX(-50%) translateY(20px);
  background: var(--accent); color: var(--black); padding: 14px 28px; border-radius: 50px;
  font-size: 14px; font-weight: 700; opacity: 0; pointer-events: none;
  transition: opacity 0.3s, transform 0.3s; z-index: 9999;
}
.toast.error { background: var(--accent2); color: var(--white); }
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

/* LIST */
.list-card {
  background: var(--gray); border: 1px solid var(--gray2); border-radius: 16px; overflow: hidden;
}
.list-header {
  padding: 24px 28px; border-bottom: 1px solid var(--gray2);
  display: flex; align-items: center; justify-content: space-between;
}
.list-header h2 { font-family: var(--font-display); font-size: 22px; color: var(--white); }
.list-count { font-size: 13px; color: var(--muted); }
.list-item {
  display: grid; grid-template-columns: 56px 1fr auto;
  gap: 16px; align-items: center; padding: 16px 28px;
  border-bottom: 1px solid var(--gray2); transition: background 0.2s;
}
.list-item:last-child { border-bottom: none; }
.list-item:hover { background: rgba(255,255,255,0.02); }
.list-thumb {
  width: 56px; height: 56px; border-radius: 8px; object-fit: cover;
  background: var(--black); display: block;
}
.list-thumb-placeholder {
  width: 56px; height: 56px; border-radius: 8px; background: var(--black);
  display: flex; align-items: center; justify-content: center; color: #444; font-size: 11px;
}
.list-info { display: flex; flex-direction: column; gap: 4px; }
.list-title { font-size: 15px; font-weight: 700; color: var(--white); }
.list-meta { font-size: 12px; color: var(--muted); }
.list-meta span { color: var(--accent); margin-right: 8px; }
.btn-delete {
  background: none; border: 1px solid rgba(255,77,0,0.3); color: var(--accent2);
  padding: 7px 14px; border-radius: 6px; font-size: 12px; cursor: pointer; transition: all 0.2s;
  white-space: nowrap;
}
.btn-delete:hover { background: rgba(255,77,0,0.1); }
.list-empty { padding: 48px; text-align: center; color: var(--muted); font-size: 14px; }
.list-loading { padding: 48px; text-align: center; color: var(--muted); font-size: 14px; }

@media (max-width: 600px) {
  .form-row { grid-template-columns: 1fr; }
  .admin-header { padding: 14px 20px; }
  .admin-body { padding: 28px 16px; }
  .form-card { padding: 24px 20px; }
}
</style>
</head>
<body>

<!-- 로그인 -->
<div id="login-screen">
  <div class="login-box">
    <h1>O.D.D</h1>
    <p>포트폴리오 관리 어드민</p>
    <input type="password" id="pw-input" placeholder="비밀번호 입력" onkeydown="if(event.key==='Enter')doLogin()">
    <button class="btn-login" onclick="doLogin()">로그인</button>
    <p class="login-err" id="login-err">비밀번호가 틀렸습니다.</p>
  </div>
</div>

<!-- 어드민 -->
<div id="admin-screen">
  <div class="admin-header">
    <h1>STUDIO <span>O.D.D</span> — 포트폴리오 관리</h1>
    <button class="btn-logout" onclick="doLogout()">로그아웃</button>
  </div>

  <div class="admin-body">

    <!-- 업로드 폼 -->
    <div class="form-card">
      <h2>+ 새 포트폴리오 등록</h2>

      <div class="form-row">
        <div class="form-group">
          <label>작업명 *</label>
          <input type="text" id="f-title" placeholder="유픽클리닉 - 강남언니 랜딩페이지">
        </div>
        <div class="form-group">
          <label>작업자 *</label>
          <input type="text" id="f-worker" placeholder="Yoonsik / Erin Jung">
        </div>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label>카테고리 *</label>
          <select id="f-category">
            <option value="">선택하세요</option>
            <option value="beauty" data-label="피부·뷰티">피부·뷰티</option>
            <option value="diet" data-label="다이어트·식품">다이어트·식품</option>
            <option value="promotion" data-label="이벤트·프로모션">이벤트·프로모션</option>
            <option value="pt" data-label="헬스·PT">헬스·PT</option>
            <option value="academy" data-label="학원·교육">학원·교육</option>
            <option value="editorial" data-label="인쇄·기타">인쇄·기타</option>
          </select>
        </div>
        <div class="form-group">
          <label>한 줄 설명</label>
          <input type="text" id="f-desc" placeholder="브랜드 시즌 이벤트 프로모션 랜딩페이지">
        </div>
      </div>

      <div class="form-row full">
        <div class="form-group">
          <label>특징 (콤마로 구분)</label>
          <input type="text" id="f-features" placeholder="고급 비주얼, 시즌 이벤트, 모바일 최적화">
        </div>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label>썸네일 이미지 *</label>
          <div class="upload-zone" id="zone-thumb" ondragover="onDrag(event,'zone-thumb')" ondragleave="offDrag('zone-thumb')" ondrop="onDrop(event,'thumb')">
            <input type="file" id="file-thumb" accept="image/*" onchange="onFileChange(event,'thumb')">
            <div class="upload-icon">🖼️</div>
            <p>클릭하거나 <span>드래그</span>해서 업로드<br><small>카드에 보이는 미리보기 이미지</small></p>
            <img class="upload-preview" id="prev-thumb">
            <div class="upload-progress" id="prog-thumb"><div class="upload-progress-bar" id="progbar-thumb"></div></div>
          </div>
        </div>
        <div class="form-group">
          <label>상세 풀 이미지 *</label>
          <div class="upload-zone" id="zone-image" ondragover="onDrag(event,'zone-image')" ondragleave="offDrag('zone-image')" ondrop="onDrop(event,'image')">
            <input type="file" id="file-image" accept="image/*" onchange="onFileChange(event,'image')">
            <div class="upload-icon">📄</div>
            <p>클릭하거나 <span>드래그</span>해서 업로드<br><small>모달에서 보이는 세로 롱이미지</small></p>
            <img class="upload-preview" id="prev-image">
            <div class="upload-progress" id="prog-image"><div class="upload-progress-bar" id="progbar-image"></div></div>
          </div>
        </div>
      </div>

      <div class="form-actions">
        <button class="btn-reset" onclick="resetForm()">초기화</button>
        <button class="btn-submit" id="btn-submit" onclick="submitPortfolio()">포트폴리오 등록하기 →</button>
      </div>
    </div>

    <!-- 목록 -->
    <div class="list-card">
      <div class="list-header">
        <h2>등록된 포트폴리오</h2>
        <span class="list-count" id="list-count">불러오는 중...</span>
      </div>
      <div id="portfolio-list"><div class="list-loading">불러오는 중...</div></div>
    </div>

  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ── 설정 ──────────────────────────────────────────
const SUPABASE_URL = 'https://zqiophoueasyjvwjapai.supabase.co';
const SUPABASE_KEY = 'sb_publishable_NVHZWgrprdaKCgZ4mqmEEg_vt43h2Hz';
const ADMIN_PW     = 'odd2026!';   // ← 비밀번호 변경 가능

// ── 로그인 ────────────────────────────────────────
function doLogin() {
  const pw = document.getElementById('pw-input').value;
  if (pw === ADMIN_PW) {
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('admin-screen').style.display = 'block';
    loadList();
  } else {
    document.getElementById('login-err').style.display = 'block';
  }
}
function doLogout() {
  document.getElementById('login-screen').style.display = 'flex';
  document.getElementById('admin-screen').style.display = 'none';
  document.getElementById('pw-input').value = '';
}

// ── 토스트 ────────────────────────────────────────
function showToast(msg, isErr = false) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast' + (isErr ? ' error' : '') + ' show';
  setTimeout(() => t.className = 'toast' + (isErr ? ' error' : ''), 3000);
}

// ── 이미지 업로드 상태 ────────────────────────────
const uploadedUrls = { thumb: null, image: null };

function onDrag(e, zoneId) { e.preventDefault(); document.getElementById(zoneId).classList.add('dragover'); }
function offDrag(zoneId) { document.getElementById(zoneId).classList.remove('dragover'); }
function onDrop(e, key) {
  e.preventDefault();
  const zoneId = key === 'thumb' ? 'zone-thumb' : 'zone-image';
  offDrag(zoneId);
  const file = e.dataTransfer.files[0];
  if (file) uploadImage(file, key);
}
function onFileChange(e, key) {
  const file = e.target.files[0];
  if (file) uploadImage(file, key);
}

async function uploadImage(file, key) {
  const prevEl  = document.getElementById('prev-' + key);
  const progEl  = document.getElementById('prog-' + key);
  const barEl   = document.getElementById('progbar-' + key);

  // 미리보기
  const reader = new FileReader();
  reader.onload = e => { prevEl.src = e.target.result; prevEl.style.display = 'block'; };
  reader.readAsDataURL(file);

  // 업로드
  progEl.style.display = 'block';
  barEl.style.width = '30%';

  const ext      = file.name.split('.').pop();
  const fileName = `${key}_${Date.now()}.${ext}`;

  const res = await fetch(`${SUPABASE_URL}/storage/v1/object/portfolio-images/${fileName}`, {
    method: 'POST',
    headers: {
      'apikey': SUPABASE_KEY,
      'Authorization': `Bearer ${SUPABASE_KEY}`,
      'Content-Type': file.type,
      'x-upsert': 'true',
    },
    body: file,
  });

  barEl.style.width = '100%';
  setTimeout(() => { progEl.style.display = 'none'; barEl.style.width = '0%'; }, 600);

  if (!res.ok) { showToast('이미지 업로드 실패 😢', true); return; }

  uploadedUrls[key] = `${SUPABASE_URL}/storage/v1/object/public/portfolio-images/${fileName}`;
  showToast(key === 'thumb' ? '썸네일 업로드 완료 ✅' : '상세이미지 업로드 완료 ✅');
}

// ── 등록 ──────────────────────────────────────────
async function submitPortfolio() {
  const title    = document.getElementById('f-title').value.trim();
  const worker   = document.getElementById('f-worker').value.trim();
  const catEl    = document.getElementById('f-category');
  const category = catEl.value;
  const catLabel = catEl.options[catEl.selectedIndex]?.dataset.label || '';
  const desc     = document.getElementById('f-desc').value.trim();
  const features = document.getElementById('f-features').value.trim();

  if (!title || !worker || !category) { showToast('작업명, 작업자, 카테고리는 필수입니다.', true); return; }
  if (!uploadedUrls.thumb)  { showToast('썸네일 이미지를 업로드해주세요.', true); return; }
  if (!uploadedUrls.image)  { showToast('상세 이미지를 업로드해주세요.', true); return; }

  const btn = document.getElementById('btn-submit');
  btn.disabled = true;
  btn.textContent = '등록 중...';

  const res = await fetch(`${SUPABASE_URL}/rest/v1/portfolio`, {
    method: 'POST',
    headers: {
      'apikey': SUPABASE_KEY,
      'Authorization': `Bearer ${SUPABASE_KEY}`,
      'Content-Type': 'application/json',
      'Prefer': 'return=minimal',
    },
    body: JSON.stringify({
      title, worker, category,
      category_label: catLabel,
      desc, features,
      thumbnail_url: uploadedUrls.thumb,
      image_url:     uploadedUrls.image,
      visible: true,
    }),
  });

  btn.disabled = false;
  btn.textContent = '포트폴리오 등록하기 →';

  if (res.ok) {
    showToast('등록 완료! 🎉');
    resetForm();
    loadList();
  } else {
    showToast('등록 실패. 다시 시도해주세요.', true);
  }
}

// ── 초기화 ────────────────────────────────────────
function resetForm() {
  ['f-title','f-worker','f-desc','f-features'].forEach(id => document.getElementById(id).value = '');
  document.getElementById('f-category').value = '';
  ['thumb','image'].forEach(key => {
    uploadedUrls[key] = null;
    document.getElementById('prev-' + key).style.display = 'none';
    document.getElementById('file-' + key).value = '';
  });
}

// ── 목록 ──────────────────────────────────────────
async function loadList() {
  const listEl  = document.getElementById('portfolio-list');
  const countEl = document.getElementById('list-count');
  listEl.innerHTML = '<div class="list-loading">불러오는 중...</div>';

  const res = await fetch(
    `${SUPABASE_URL}/rest/v1/portfolio?order=created_at.desc&select=*`,
    { headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}` } }
  );
  const rows = await res.json();
  countEl.textContent = `총 ${rows.length}개`;

  if (!rows.length) {
    listEl.innerHTML = '<div class="list-empty">등록된 포트폴리오가 없습니다.</div>';
    return;
  }

  listEl.innerHTML = rows.map(r => `
    <div class="list-item">
      ${r.thumbnail_url
        ? `<img class="list-thumb" src="${r.thumbnail_url}" alt="${r.title}">`
        : `<div class="list-thumb-placeholder">NO IMG</div>`}
      <div class="list-info">
        <div class="list-title">${r.title}</div>
        <div class="list-meta">
          <span>${r.category_label || r.category}</span>
          ${r.worker} · ${r.visible ? '공개' : '비공개'}
        </div>
      </div>
      <button class="btn-delete" onclick="deleteItem(${r.id}, '${r.thumbnail_url}', '${r.image_url}')">삭제</button>
    </div>`).join('');
}

// ── 삭제 ──────────────────────────────────────────
async function deleteItem(id, thumbUrl, imageUrl) {
  if (!confirm('정말 삭제하시겠습니까?')) return;

  // DB 삭제
  await fetch(`${SUPABASE_URL}/rest/v1/portfolio?id=eq.${id}`, {
    method: 'DELETE',
    headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}` }
  });

  // Storage 파일 삭제
  for (const url of [thumbUrl, imageUrl]) {
    if (!url) continue;
    const fileName = url.split('/portfolio-images/')[1];
    if (!fileName) continue;
    await fetch(`${SUPABASE_URL}/storage/v1/object/portfolio-images/${fileName}`, {
      method: 'DELETE',
      headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}` }
    });
  }

  showToast('삭제 완료');
  loadList();
}
</script>
</body>
</html>
