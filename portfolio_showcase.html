const CATEGORY_MAP = {
  hospital: '병원·의원', diet: '다이어트·식품',
  pt: '헬스·PT', academy: '학원·교육', beauty: '피부·뷰티'

// ── 메인 탭 전환 ──
function switchMainTab(tab, btn) {
  document.querySelectorAll('.main-tab').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('section-detail').style.display  = tab === 'detail'  ? '' : 'none';
  document.getElementById('section-website').style.display = tab === 'website' ? '' : 'none';
  if (tab === 'website') renderWebPortfolio();
}

// ── 홈페이지 포트폴리오 렌더 ──
function renderWebPortfolio() {
  const grid = document.getElementById('webGrid');
  const liveCount = WEBSITE_DATA.filter(w => w.liveTag === 'live').length;
  document.getElementById('web-count').textContent = String(liveCount).padStart(2, '0');

  grid.innerHTML = WEBSITE_DATA.map(w => {
    const tagHtml = w.tags.map(t => `<span class="web-card-tag">${t}</span>`).join('');
    const liveBadge = w.liveTag === 'live'
      ? `<span class="web-card-tag live">● LIVE</span>`
      : `<span class="web-card-tag dev">▲ 준비중</span>`;
    const thumb = w.thumbSrc
      ? `<img src="${w.thumbSrc}" alt="${w.title}" onerror="this.src='https://via.placeholder.com/800x500/141414/333333?text=STUDIO+O.D.D'">`
      : `<div style="width:100%;height:100%;display:flex;align-items:center;justify-content:center;color:#333;font-size:13px;letter-spacing:2px;">COMING SOON</div>`;
    return `
      <a href="${w.url || '#'}" ${w.url ? 'target="_blank" rel="noopener"' : ''} class="web-card${!w.url ? ' coming-soon' : ''}">
        <div class="web-card-thumb">
          ${thumb}
          <div class="web-card-overlay"><span class="web-card-link-icon">↗</span></div>
        </div>
        <div class="web-card-info">
          <div class="web-card-tags">${liveBadge}${tagHtml}</div>
          <h3 class="web-card-title">${w.title}</h3>
          <p class="web-card-desc">${w.desc}</p>
          <div class="web-card-footer">
            <span class="web-card-type">${w.type}</span>
            <span class="web-card-arrow">↗</span>
          </div>
        </div>
      </a>`;
  }).join('');
}

// ── 상세페이지 렌더 ──
function renderPortfolio(filter = 'all') {
  const grid = document.getElementById('portfolioGrid');
  const data = filter === 'all' ? PORTFOLIO_DATA : PORTFOLIO_DATA.filter(i => i.category === filter);
  if (data.length === 0) {
    grid.innerHTML = `<div style="grid-column:1/-1;text-align:center;padding:60px 0;color:var(--muted);">준비 중인 포트폴리오입니다.</div>`;
    return;
  }
  grid.innerHTML = data.map(item => `
    <div class="portfolio-card" onclick="openModal(${item.id})">
      <div class="card-img-wrap">
        <img class="card-img" src="${item.imgSrc}" alt="${item.title}" onerror="this.src='https://via.placeholder.com/600x800/141414/ffffff?text=STUDIO+O.D.D'">
        <div class="card-overlay"></div>
      </div>
      <div class="card-info">
        <span class="card-tag">${CATEGORY_MAP[item.category] || '기타'}</span>
        <h3 class="card-title">${item.title}</h3>
        <p class="card-desc">${item.desc}</p>
      </div>
    </div>
  `).join('');
}

function filterCategory(category, event) {
  document.querySelectorAll('.filter-btn').forEach(btn => btn.classList.remove('active'));
  event.target.classList.add('active');
  renderPortfolio(category);
}

// ── 모달 ──
function openModal(id) {
  const item = PORTFOLIO_DATA.find(p => p.id === id);
  if (!item) return;
  document.getElementById('m-tag').textContent = CATEGORY_MAP[item.category] || '기타';
  document.getElementById('m-title').textContent = item.title;
  document.getElementById('m-desc').textContent = item.desc;
  document.getElementById('m-features').innerHTML = item.features.map(f => `<li>${f}</li>`).join('');
  document.getElementById('m-long-img').src = item.longImgSrc;
  document.querySelector('.modal-viewer').scrollTop = 0;
  document.getElementById('portfolioModal').classList.add('open');
  document.body.style.overflow = 'hidden';
}
function closeModal() {
  document.getElementById('portfolioModal').classList.remove('open');
  document.body.style.overflow = '';
}

// ── URL 파라미터로 탭 자동 전환 (?tab=website) ──
window.addEventListener('DOMContentLoaded', () => {
  renderPortfolio('all');
  const params = new URLSearchParams(location.search);
  if (params.get('tab') === 'website') {
    switchMainTab('website', document.querySelectorAll('.main-tab')[1]);
  }
});
</script>
