<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Studio O.D.D | Portfolio & Templates</title>
  <meta name="description" content="디자인 맡길 때 어디야? 오디디지. 상세페이지·홈페이지·템플릿 포트폴리오를 확인하세요." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #0a0a0a;
      --surface: #111111;
      --border: #1e1e1e;
      --accent: #ff3c00;
      --accent2: #ffb800;
      --text: #f0f0f0;
      --muted: #666;
      --card-bg: #141414;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html { scroll-behavior: smooth; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Noto Sans KR', sans-serif;
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* NAV */
    nav {
      position: fixed; top: 0; left: 0; right: 0; z-index: 100;
      display: flex; align-items: center; justify-content: space-between;
      padding: 20px 48px;
      background: rgba(10,10,10,0.85);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
    }
    .nav-logo {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 22px;
      letter-spacing: 3px;
      color: var(--text);
      text-decoration: none;
    }
    .nav-logo span { color: var(--accent); }

    /* HERO */
    .hero {
      padding: 160px 48px 80px;
      max-width: 1200px;
      margin: 0 auto;
    }
    .hero-label {
      font-size: 11px;
      letter-spacing: 4px;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 20px;
    }
    .hero h1 {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(52px, 7vw, 96px);
      line-height: 1;
      letter-spacing: 2px;
      margin-bottom: 24px;
    }
    .hero h1 em {
      font-style: normal;
      color: var(--accent);
    }
    .hero p {
      font-size: 15px;
      color: var(--muted);
      line-height: 1.8;
      max-width: 500px;
    }

    /* TABS */
    .tabs-wrapper {
      max-width: 1200px;
      margin: 0 auto;
      padding: 0 48px 48px;
    }
    .tabs {
      display: flex;
      gap: 4px;
      margin-bottom: 32px;
      border-bottom: 1px solid var(--border);
      padding-bottom: 0;
    }
    .tab-btn {
      background: none;
      border: none;
      color: var(--muted);
      font-family: 'Noto Sans KR', sans-serif;
      font-size: 13px;
      font-weight: 500;
      padding: 12px 20px;
      cursor: pointer;
      position: relative;
      transition: color 0.2s;
      letter-spacing: 0.5px;
      white-space: nowrap;
    }
    .tab-btn::after {
      content: '';
      position: absolute;
      bottom: -1px; left: 0; right: 0;
      height: 2px;
      background: var(--accent);
      transform: scaleX(0);
      transition: transform 0.2s;
    }
    .tab-btn:hover { color: var(--text); }
    .tab-btn.active { color: var(--text); }
    .tab-btn.active::after { transform: scaleX(1); }

    /* TAG FILTERS */
    .tag-filters {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 40px;
    }
    .tag-btn {
      background: none;
      border: 1px solid var(--border);
      color: var(--muted);
      font-family: 'Noto Sans KR', sans-serif;
      font-size: 12px;
      padding: 6px 16px;
      border-radius: 100px;
      cursor: pointer;
      transition: all 0.2s;
    }
    .tag-btn:hover { border-color: var(--accent); color: var(--text); }
    .tag-btn.active {
      background: var(--accent);
      border-color: var(--accent);
      color: #fff;
    }

    /* GRID */
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
      gap: 2px;
    }

    /* CARD */
    .card {
      background: var(--card-bg);
      position: relative;
      overflow: hidden;
      cursor: pointer;
      aspect-ratio: 4/3;
    }
    .card img {
      width: 100%; height: 100%;
      object-fit: cover;
      transition: transform 0.6s cubic-bezier(0.25, 0.46, 0.45, 0.94);
      display: block;
    }
    .card:hover img { transform: scale(1.05); }
    .card-overlay {
      position: absolute; inset: 0;
      background: linear-gradient(to top, rgba(0,0,0,0.92) 0%, rgba(0,0,0,0.3) 50%, transparent 100%);
      opacity: 0;
      transition: opacity 0.3s;
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      padding: 24px;
    }
    .card:hover .card-overlay { opacity: 1; }
    .card-tag {
      font-size: 10px;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 8px;
    }
    .card-title {
      font-size: 16px;
      font-weight: 700;
      margin-bottom: 6px;
    }
    .card-worker {
      font-size: 12px;
      color: var(--muted);
    }
    .card-no-img {
      width: 100%; height: 100%;
      background: var(--surface);
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--muted);
      font-size: 12px;
    }

    /* LOADING */
    .loading {
      grid-column: 1/-1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 80px 0;
      gap: 8px;
    }
    .dot {
      width: 8px; height: 8px;
      background: var(--accent);
      border-radius: 50%;
      animation: bounce 1.2s infinite;
    }
    .dot:nth-child(2) { animation-delay: 0.2s; }
    .dot:nth-child(3) { animation-delay: 0.4s; }
    @keyframes bounce {
      0%, 60%, 100% { transform: translateY(0); opacity: 0.4; }
      30% { transform: translateY(-12px); opacity: 1; }
    }

    /* EMPTY */
    .empty {
      grid-column: 1/-1;
      text-align: center;
      padding: 80px 0;
      color: var(--muted);
      font-size: 14px;
    }

    /* MODAL */
    .modal-backdrop {
      position: fixed; inset: 0; z-index: 200;
      background: rgba(0,0,0,0.92);
      display: flex; align-items: center; justify-content: center;
      padding: 24px;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s;
    }
    .modal-backdrop.open { opacity: 1; pointer-events: all; }
    .modal {
      background: var(--surface);
      max-width: 800px;
      width: 100%;
      max-height: 90vh;
      overflow-y: auto;
      position: relative;
      transform: translateY(20px);
      transition: transform 0.3s;
    }
    .modal-backdrop.open .modal { transform: translateY(0); }
    .modal-img { width: 100%; display: block; }
    .modal-body { padding: 28px 32px 32px; }
    .modal-tag {
      font-size: 10px;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 10px;
    }
    .modal-title {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 36px;
      letter-spacing: 2px;
      margin-bottom: 8px;
    }
    .modal-worker {
      font-size: 13px;
      color: var(--muted);
      margin-bottom: 24px;
    }
    .modal-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 28px;
    }
    .modal-tag-chip {
      font-size: 11px;
      padding: 4px 12px;
      border: 1px solid var(--border);
      color: var(--muted);
      border-radius: 100px;
    }
    .modal-cta {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      background: var(--accent);
      color: #fff;
      font-family: 'Noto Sans KR', sans-serif;
      font-size: 13px;
      font-weight: 700;
      padding: 14px 28px;
      text-decoration: none;
      letter-spacing: 1px;
      transition: background 0.2s;
    }
    .modal-cta:hover { background: #d43300; }
    .modal-close {
      position: absolute; top: 16px; right: 16px;
      background: rgba(0,0,0,0.6);
      border: none;
      color: var(--text);
      font-size: 20px;
      width: 36px; height: 36px;
      border-radius: 50%;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      z-index: 10;
      transition: background 0.2s;
    }
    .modal-close:hover { background: var(--accent); }

    /* ERROR */
    .error-box {
      grid-column: 1/-1;
      padding: 40px;
      border: 1px solid #ff3c0033;
      background: #ff3c000a;
      text-align: center;
    }
    .error-box p { color: var(--muted); font-size: 13px; margin-top: 8px; }

    /* FOOTER */
    footer {
      border-top: 1px solid var(--border);
      padding: 32px 48px;
      text-align: center;
      color: var(--muted);
      font-size: 12px;
      margin-top: 80px;
    }

    @media (max-width: 768px) {
      nav { padding: 16px 20px; }
      .hero { padding: 120px 20px 60px; }
      .tabs-wrapper { padding: 0 20px 40px; }
      .grid { grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 2px; }
      footer { padding: 24px 20px; }
    }
  </style>
</head>
<body>

<nav>
  <a class="nav-logo" href="/"><span>O</span>.D.D</a>
</nav>

<section class="hero">
  <p class="hero-label">Our Masterpiece</p>
  <h1>시선은 마케팅이 모으고,<br><em>감각적인 웹</em>이 머무름을 만듭니다</h1>
  <p>ODD STUDIO는 각 분야의 스페셜리스트들이 모인 전문가 그룹입니다.<br>브랜드의 정체성을 담은 디자인과 마케팅 전략으로 매출의 판도를 바꿉니다.</p>
</section>

<div class="tabs-wrapper">
  <div class="tabs">
    <button class="tab-btn active" data-tab="all">전체보기</button>
    <button class="tab-btn" data-tab="상세페이지">상세페이지</button>
    <button class="tab-btn" data-tab="홈페이지">홈페이지 제작</button>
    <button class="tab-btn" data-tab="템플릿">템플릿</button>
  </div>

  <div class="tag-filters" id="tagFilters">
    <button class="tag-btn active" data-tag="all">전체</button>
    <button class="tag-btn" data-tag="병원·의원">병원·의원</button>
    <button class="tag-btn" data-tag="다이어트·식품">다이어트·식품</button>
    <button class="tag-btn" data-tag="헬스·PT">헬스·PT</button>
    <button class="tag-btn" data-tag="학원·교육">학원·교육</button>
    <button class="tag-btn" data-tag="피부·뷰티">피부·뷰티</button>
  </div>

  <div class="grid" id="portfolioGrid">
    <div class="loading">
      <div class="dot"></div>
      <div class="dot"></div>
      <div class="dot"></div>
    </div>
  </div>
</div>

<!-- MODAL -->
<div class="modal-backdrop" id="modalBackdrop">
  <div class="modal" id="modal">
    <button class="modal-close" id="modalClose">✕</button>
    <img class="modal-img" id="modalImg" src="" alt="" />
    <div class="modal-body">
      <p class="modal-tag" id="modalCategory"></p>
      <h2 class="modal-title" id="modalTitle"></h2>
      <p class="modal-worker" id="modalWorker"></p>
      <div class="modal-tags" id="modalTags"></div>
      <a class="modal-cta" id="modalLink" href="#" target="_blank">⚡ 이 품목 맞춤 상담 신청하기</a>
    </div>
  </div>
</div>

<footer>
  © 2026 STUDIO O.D.D. All Rights Reserved. 전환율 중심 기획 × 하이엔드 비주얼 에이전시
</footer>

<script>
  // =============================================
  // 🔧 설정값 (여기만 수정하면 됩니다)
  // =============================================
  const NOTION_TOKEN = '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';
  const DATABASE_ID = '375583e758ab8039bd0cec1c2ee3144d';
  const PROXY = 'https://notion-proxy.vercel.app/api/notion'; // CORS 우회용 (아래 설명 참고)
  // =============================================

  let allItems = [];
  let currentTab = 'all';
  let currentTag = 'all';

  // Notion API 직접 호출 (CORS 문제로 프록시 필요 - 없으면 아래 fallback 사용)
  async function fetchFromNotion() {
    const url = `https://api.notion.com/v1/databases/${DATABASE_ID}/query`;
    const body = {
      filter: {
        property: 'visible',
        checkbox: { equals: true }
      },
      sorts: [{ timestamp: 'created_time', direction: 'descending' }]
    };

    // 브라우저에서 Notion API 직접 호출은 CORS 차단됨
    // → Vercel serverless function 프록시 사용
    try {
      const res = await fetch('/api/notion-proxy', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ url, body, token: NOTION_TOKEN })
      });
      if (!res.ok) throw new Error('proxy error');
      return await res.json();
    } catch {
      // fallback: 직접 호출 시도 (로컬 개발 or 프록시 없을 때)
      const res2 = await fetch(url, {
        method: 'POST',
        headers: {
          'Authorization': `Bearer ${NOTION_TOKEN}`,
          'Notion-Version': '2022-06-28',
          'Content-Type': 'application/json'
        },
        body: JSON.stringify(body)
      });
      if (!res2.ok) throw new Error(`Notion API error: ${res2.status}`);
      return await res2.json();
    }
  }

  function parseItem(page) {
    const props = page.properties;
    const getSelect = (p) => p?.select?.name || '';
    const getMultiSelect = (p) => p?.multi_select?.map(s => s.name) || [];
    const getText = (p) => p?.rich_text?.[0]?.plain_text || '';
    const getTitle = (p) => p?.title?.[0]?.plain_text || '';
    const getUrl = (p) => p?.url || '';
    const getFiles = (p) => p?.files?.[0]?.file?.url || p?.files?.[0]?.external?.url || '';

    return {
      id: page.id,
      title: getTitle(props['이름'] || props['Name'] || props['title']),
      category: getSelect(props['category']),
      tags: getMultiSelect(props['tag']),
      image: getFiles(props['image']),
      link: getUrl(props['link']),
      worker: getText(props['worker']),
    };
  }

  function renderGrid() {
    const grid = document.getElementById('portfolioGrid');
    let items = allItems;

    if (currentTab !== 'all') {
      items = items.filter(i => i.category === currentTab);
    }
    if (currentTag !== 'all') {
      items = items.filter(i => i.tags.includes(currentTag));
    }

    if (items.length === 0) {
      grid.innerHTML = '<div class="empty">등록된 포트폴리오가 없습니다.</div>';
      return;
    }

    grid.innerHTML = items.map(item => `
      <div class="card" data-id="${item.id}" onclick="openModal('${item.id}')">
        ${item.image
          ? `<img src="${item.image}" alt="${item.title}" loading="lazy" />`
          : `<div class="card-no-img">이미지 없음</div>`}
        <div class="card-overlay">
          <p class="card-tag">${item.category || ''}</p>
          <h3 class="card-title">${item.title}</h3>
          ${item.worker ? `<p class="card-worker">✏️ ${item.worker}</p>` : ''}
        </div>
      </div>
    `).join('');
  }

  function openModal(id) {
    const item = allItems.find(i => i.id === id);
    if (!item) return;

    document.getElementById('modalImg').src = item.image || '';
    document.getElementById('modalImg').style.display = item.image ? 'block' : 'none';
    document.getElementById('modalCategory').textContent = item.category;
    document.getElementById('modalTitle').textContent = item.title;
    document.getElementById('modalWorker').textContent = item.worker ? `✏️ ${item.worker}` : '';
    document.getElementById('modalTags').innerHTML = item.tags.map(t =>
      `<span class="modal-tag-chip">${t}</span>`
    ).join('');
    const link = document.getElementById('modalLink');
    if (item.link) {
      link.href = item.link;
      link.style.display = 'inline-flex';
    } else {
      link.style.display = 'none';
    }

    document.getElementById('modalBackdrop').classList.add('open');
    document.body.style.overflow = 'hidden';
  }

  function closeModal() {
    document.getElementById('modalBackdrop').classList.remove('open');
    document.body.style.overflow = '';
  }

  document.getElementById('modalClose').addEventListener('click', closeModal);
  document.getElementById('modalBackdrop').addEventListener('click', (e) => {
    if (e.target === e.currentTarget) closeModal();
  });

  // Tab 이벤트
  document.querySelectorAll('.tab-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      currentTab = btn.dataset.tab;
      renderGrid();
    });
  });

  // Tag 이벤트
  document.querySelectorAll('.tag-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.tag-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      currentTag = btn.dataset.tag;
      renderGrid();
    });
  });

  // 초기 로드
  async function init() {
    const grid = document.getElementById('portfolioGrid');
    try {
      const data = await fetchFromNotion();
      allItems = (data.results || []).map(parseItem);
      renderGrid();
    } catch (err) {
      console.error(err);
      grid.innerHTML = `
        <div class="error-box">
          <strong>데이터를 불러오지 못했습니다</strong>
          <p>Notion 연결 또는 API 프록시 설정을 확인해주세요.</p>
        </div>`;
    }
  }

  init();
</script>
</body>
</html>
