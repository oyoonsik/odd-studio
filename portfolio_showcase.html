const CATEGORY_MAP = {
  hospital: '병원·의원',
  diet: '다이어트·식품',
  pt: '헬스·PT',
  academy: '학원·교육',
  beauty: '피부·뷰티'
};

// ── RENDER CARDS ──
function renderPortfolio(filter = 'all') {
  const grid = document.getElementById('portfolioGrid');
  const filteredData = filter === 'all' ? PORTFOLIO_DATA : PORTFOLIO_DATA.filter(item => item.category === filter);
  
  if (filteredData.length === 0) {
    grid.innerHTML = `<div style="grid-column: 1/-1; text-align: center; padding: 60px 0; color: var(--muted);">준비 중인 포트폴리오입니다.</div>`;
    return;
  }
  
  grid.innerHTML = filteredData.map(item => `
    <div class="portfolio-card" onclick="openModal(${item.id})">
      <div class="card-img-wrap">
        <img class="card-img" src="${item.imgSrc}" alt="${item.title}" onerror="this.src='https://via.placeholder.com/600x800/141414/ffffff?text=STUDIO+O.D.D'">
        <div class="card-overlay"></div>
      </div>
      <div class="card-info">
        <span class="card-tag">${CATEGORY_MAP[item.category] || '기타'}</span>
        <h3 class="card-title">${item.title}</h3>
        <p class="card-desc">${item.desc}</p>
      </div>
    </div>
  `).join('');
}

// ── FILTER TRIGGER ──
function filterCategory(category, event) {
  document.querySelectorAll('.filter-btn').forEach(btn => btn.classList.remove('active'));
  event.target.classList.add('active');
  renderPortfolio(category);
}

// ── MODAL SYSTEM ──
function openModal(id) {
  const item = PORTFOLIO_DATA.find(p => p.id === id);
  if (!item) return;
  
  document.getElementById('m-tag').textContent = CATEGORY_MAP[item.category] || '기타';
  document.getElementById('m-title').textContent = item.title;
  document.getElementById('m-desc').textContent = item.desc;
  
  // 기획 핵심 포인트 바인딩
  const featuresList = document.getElementById('m-features');
  featuresList.innerHTML = item.features.map(f => `<li>${f}</li>`).join('');
  
  // 이미지 매칭 및 상단 스크롤 초기화
  const longImg = document.getElementById('m-long-img');
  longImg.src = item.longImgSrc;
  document.querySelector('.modal-viewer').scrollTop = 0;
  
  document.getElementById('portfolioModal').classList.add('open');
  document.body.style.overflow = 'hidden'; // 부모 페이지 스크롤 방지
}

function closeModal() {
  document.getElementById('portfolioModal').classList.remove('open');
  document.body.style.overflow = '';
}

// 초기 로딩 실행
window.addEventListener('DOMContentLoaded', () => {
  renderPortfolio('all');
});
