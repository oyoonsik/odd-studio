<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Studio O.D.D | 전문가 라인업</title>
<meta name="description" content="Studio O.D.D 파트너 전문가 라인업. 업종별 전문 전문가를 매칭해드립니다.">
<meta property="og:type" content="website">
<meta property="og:image" content="https://odd-studio.vercel.app/img/thumbnail.png">
<link rel="icon" type="image/png" href="img/favicon.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Noto+Sans+KR:wght@300;400;500;700;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/header.css">
<style>
:root {
  --black: #0a0a0a; --white: #f5f5f0;
  --accent: #c8ff00; --accent2: #ff4d00;
  --gray: #141414; --gray2: #222; --muted: #a0a0a0;
  --font-display: 'Bebas Neue', sans-serif;
  --font-body: 'Noto Sans KR', sans-serif;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body { background: var(--black); color: var(--white); font-family: var(--font-body); overflow-x: hidden; -webkit-font-smoothing: antialiased; }

/* ── FILTER SECTION (상단 여백을 주어 메인 아래에 바로 붙도록 조절) ── */
.filter-container {
  padding: 100px 48px 0; /* 메인 콘텐츠 아래에서 자연스럽게 떨어지는 여백 */
  display: flex;
  flex-direction: column;
  align-items: center;
}
.filter-wrap {
  display: flex; gap: 12px; flex-wrap: wrap;
  justify-content: center;
  margin-bottom: 56px;
}
.filter-tab {
  background: var(--gray); color: var(--white); border: 1px solid rgba(255,255,255,0.08);
  padding: 12px 26px; border-radius: 50px; font-size: 14px; font-weight: 500; cursor: pointer; transition: all 0.25s ease;
}
.filter-tab:hover { border-color: var(--accent); color: var(--accent); }
.filter-tab.active { background: var(--accent); color: #0a0a0a; border-color: var(--accent); font-weight: 700; }

/* ── 프리미엄 디자이너 그리드 & 카드 스타일 ── */
.lineup-section { padding: 0 48px 120px; max-width: 1300px; margin: 0 auto; }
.lineup-grid {
  display: grid; grid-template-columns: repeat(3, 1fr);
  gap: 32px; background: transparent; border: none;
}
.d-card {
  background: var(--gray); border: 1px solid rgba(255,255,255,0.05); border-radius: 24px;
  padding: 36px 30px; display: flex; flex-direction: column; align-items: center; text-align: center;
  position: relative; transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1), border-color 0.3s;
}
.d-card:hover { transform: translateY(-8px); border-color: rgba(200,255,0,0.3); }

/* 상태 배지 우측 상단 배치 */
.d-status {
  position: absolute; top: 24px; right: 24px; display: inline-flex; align-items: center; gap: 6px; 
  padding: 6px 14px; border-radius: 30px; background: rgba(0,0,0,0.4); border: 1px solid rgba(255,255,255,0.05);
}
.d-status-dot { width: 6px; height: 6px; border-radius: 50%; }
.d-status-text { font-size: 11px; font-weight: 700; letter-spacing: -0.2px; }

/* 상태 색상 지정 */
.d-card.available .d-status-dot { background: #3DD68C; box-shadow: 0 0 10px #3DD68C; animation: blink 1.8s ease-in-out infinite; }
.d-card.available .d-status-text { color: #3DD68C; }
.d-card.busy .d-status-dot { background: var(--accent2); box-shadow: 0 0 10px var(--accent2); }
.d-card.busy .d-status-text { color: var(--accent2); }
.d-card.rest .d-status-dot { background: #555; }
.d-card.rest .d-status-text { color: #888; }

/* 원형 아바타 */
.d-avatar {
  width: 96px; height: 96px; border-radius: 50%;
  background: #1a1a1a; border: 1px solid rgba(255,255,255,0.1);
  overflow: hidden; margin: 16px 0 20px;
  display: flex; align-items: center; justify-content: center;
}
.d-avatar img { width: 100%; height: 100%; object-fit: cover; }

.d-name { font-size: 22px; font-weight: 700; color: var(--white); margin-bottom: 4px; }
.d-role { font-size: 13px; color: var(--accent); font-weight: 500; letter-spacing: 0.5px; margin-bottom: 18px; }
.d-specs { display: flex; gap: 6px; flex-wrap: wrap; justify-content: center; margin-bottom: 20px; min-height: 26px; }
.d-spec {
  font-size: 11px; font-weight: 500; padding: 4px 10px; border-radius: 4px;
  background: rgba(255,255,255,0.05); color: #ccc; border: none;
}
.d-bio { font-size: 14px; color: var(--muted); line-height: 1.65; font-weight: 300; margin-bottom: 24px; flex: 1; }

/* 카드 하단 구분선 */
.d-footer { width: 100%; display: flex; align-items: center; justify-content: space-between; padding-top: 20px; border-top: 1px solid var(--gray2); margin-top: auto; }
.d-projects { font-size: 13px; color: var(--muted); }
.d-projects strong { font-family: var(--font-body); font-size: 15px; color: var(--white); margin-right: 2px; font-weight: 700; }

.d-btn {
  font-family: var(--font-body); font-size: 13px; font-weight: 600;
  padding: 10px 18px; border-radius: 30px;
  background: transparent; border: 1px solid rgba(255,255,255,0.15); color: var(--white);
  cursor: pointer; transition: all 0.25s ease;
}
.d-card.available .d-btn { background: var(--accent); color: #0a0a0a; border-color: var(--accent); }
.d-card.available .d-btn:hover { background: #fff; border-color: #fff; transform: scale(1.03); }
.d-card.busy .d-btn:hover, .d-card.rest .d-btn:hover { background: rgba(255,255,255,0.05); border-color: var(--white); color: var(--white); }

.d-card.rest { opacity: 0.4; }
.d-card.rest:hover { opacity: 0.8; }

/* ── CTA BAND ── */
.cta-band {
  margin: 0 48px 80px; background: var(--accent);
  padding: 72px 64px; display: flex; align-items: center;
  justify-content: space-between; gap: 40px;
  position: relative; overflow: hidden; border-radius: 24px;
}
.cta-band::before {
  content: 'O.D.D'; position: absolute; right: -10px; top: 50%;
  transform: translateY(-50%); font-family: var(--font-display);
  font-size: 200px; color: rgba(0,0,0,0.06); pointer-events: none; line-height: 1;
}
.cta-band h3 { font-family: var(--font-body); font-weight: 900; font-size: clamp(26px,3.5vw,46px); color: var(--black); line-height: 1.2; }
.cta-band h3 em { color: var(--accent2); font-style: normal; }
.cta-band p { font-size: 15px; color: rgba(0,0,0,0.55); margin-top: 10px; font-weight: 500; }
.btn-cta {
  flex-shrink: 0; background: var(--black); color: var(--accent);
  font-size: 13px; font-weight: 700; letter-spacing: 2px; text-transform: uppercase;
  padding: 20px 40px; border-radius: 50px; border: none; cursor: pointer;
  white-space: nowrap; transition: opacity 0.2s; text-decoration: none; display: inline-block;
}
.btn-cta:hover { opacity: 0.85; }

/* ── FOOTER ── */
footer { padding: 56px 48px 36px; border-top: 1px solid var(--gray2); display: grid; grid-template-columns: 1fr auto; align-items: end; gap: 40px; }
.f-brand { font-family: var(--font-display); font-size: 36px; letter-spacing: 5px; color: var(--white); }
.f-brand span { color: var(--accent); }
.f-tagline { font-size: 15px; color: var(--muted); margin-top: 8px; }
.f-tagline em { color: var(--accent); font-style: normal; }
.f-desc { font-size: 13px; color: var(--muted); margin-top: 10px; line-height: 1.8; font-weight: 300; }
.f-right { text-align: right; font-size: 12px; color: var(--muted); line-height: 1.8; font-weight: 300; }

/* ── KAKAO FLOAT ── */
#kakao-float { position: fixed; bottom: 28px; right: 28px; z-index: 9999; text-decoration: none; }
.kk-inner { display: flex; align-items: center; gap: 10px; background: #FAE100; color: #3C1E1E; padding: 14px 24px 14px 18px; border-radius: 50px; box-shadow: 0 4px 24px rgba(250,225,0,0.38); font-size: 14px; font-weight: 700; position: relative; z-index: 2; white-space: nowrap; transition: transform 0.22s cubic-bezier(.34,1.56,.64,1), box-shadow 0.22s; }
#kakao-float:hover .kk-inner { transform: translateY(-3px) scale(1.04); box-shadow: 0 8px 32px rgba(250,225,0,0.5); }
.kk-pulse { position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%); width: 100%; height: 100%; border-radius: 50px; background: #FAE100; opacity: 0; z-index: 1; animation: kkPulse 2.4s ease-out infinite; }

/* ── ANIMATIONS ── */
@keyframes blink { 0%,100% { opacity:1; } 50% { opacity:0.3; } }
@keyframes kkPulse { 0% { opacity:.5; transform:translate(-50%,-50%) scale(1); } 70%,100% { opacity:0; transform:translate(-50%,-50%) scale(1.3); } }

/* ── MOBILE ── */
@media (max-width: 1024px) {
  .lineup-grid { grid-template-columns: repeat(2, 1fr); gap: 24px; }
}
@media (max-width: 768px) {
  .filter-container { padding: 60px 20px 0; }
  .filter-wrap { margin-bottom: 32px; }
  .lineup-section { padding: 0 20px 60px; }
  .lineup-grid { grid-template-columns: 1fr; gap: 24px; }
  .cta-band { margin: 0 20px 60px; flex-direction: column; padding: 44px 28px; text-align: center; }
  footer { grid-template-columns: 1fr; gap: 20px; padding: 44px 20px 28px; }
  .f-right { text-align: left; }
}
</style>
</head>
<body>

<!-- FILTER SECTION (텍스트 없이 바로 노출되는 상단 영역) -->
<section class="filter-container">
  <div class="filter-wrap">
    <button class="filter-tab active" onclick="filterDesigners('all', this)">전체</button>
    <button class="filter-tab" onclick="filterDesigners('available', this)">작업 가능</button>
    <button class="filter-tab" onclick="filterDesigners('busy', this)">작업 중</button>
    <button class="filter-tab" onclick="filterDesigners('rest', this)">휴식 중</button>
  </div>
</section>

<!-- GRID -->
<div class="lineup-section">
  <div class="lineup-grid" id="designerGrid"></div>
</div>

<!-- CTA BAND -->
<div class="cta-band">
  <div>
    <h3>맡길 전문가 찾고 있다면<br><em>오디디지.</em></h3>
    <p>업종·예산·일정 말씀주시면 최적의 전문가를 매칭해드립니다</p>
  </div>
  <button class="btn-cta" onclick="openModal(event)">전문가 매칭 문의 →</button>
</div>

<!-- FOOTER -->
<footer>
  <div>
    <div class="f-brand">STUDIO <span>O.D.D</span></div>
    <div class="f-tagline">어디야? <em>오디디지.</em></div>
    <p class="f-desc">상세페이지 · 웹사이트 · 템플릿 · 퍼포먼스 마케팅<br>팔리는 메커니즘을 아는 전문가들이 모인 올인원 에이전시</p>
  </div>
  <div class="f-right">
    Design by <strong>Studio O.D.D</strong><br>
    대표자 : 오윤식 | 사업자등록번호 : 415-78-00633<br>
    주소 : 서울시 중랑구 중화동 323-84<br>
    © 2026 Studio O.D.D. All rights reserved.
  </div>
</footer>

<!-- KAKAO FLOAT -->
<a id="kakao-float" href="https://open.kakao.com/o/siGSPWwi" target="_blank" rel="noopener" aria-label="카카오톡 문의">
  <div class="kk-inner">
    <svg width="24" height="24" viewBox="0 0 40 40" fill="none"><path d="M20 8C12.27 8 6 13.07 6 19.3c0 3.9 2.6 7.34 6.54 9.4l-1.66 6.17 7.26-4.8c.6.08 1.22.13 1.86.13 7.73 0 14-5.07 14-11.3S27.73 8 20 8z" fill="#3C1E1E"/><circle cx="14" cy="19" r="2" fill="#FAE100"/><circle cx="20" cy="19" r="2" fill="#FAE100"/><circle cx="26" cy="19" r="2" fill="#FAE100"/></svg>
    <span>카카오 문의</span>
  </div>
  <div class="kk-pulse"></div>
</a>

<script>
const DESIGNERS = [
  {
    name: 'Yoonsik',
    role: '브랜드 웹 빌더 · 웹 퍼블리셔&디자이너', 
    status: 'available',
    avatar: 'img/YOONSIK.jpg',
    specialties: ['아임웹·워드프레스 커스텀', '고전환 다크무드 디자인', '코드 기반 기능 확장'], 
    bio: '아임웹, 워드프레스, 카페24를 기반으로 관리가 쉬우면서도 트렌디한 브랜드 웹사이트를 만듭니다...',
    projects: 45
  },
  {
    name: 'Erin Jung', 
    role: '브랜드 · AI 웹디자이너',
    status: 'available', 
    avatar: 'img/EUNJAE.jpg',
    specialties: ['브랜드 홈페이지', '랜딩페이지', '학원·교육'],
    bio: '전환율 중심 상세페이지 전문...',
    projects: 35,
  },
  {
    name: 'Wonmichu~', 
    role: '브랜드 · 뷰티 웹디자이너',
    status: 'available', 
    avatar: 'img/WONMI.jpg',
    specialties: ['뷰티', '병의원', '이커머스'],
    bio: '후킹 카피 설계와 인포그래픽 기획에 강점.',
    projects: 61,
  },
  {
    name: 'CHANG', 
    role: '부동산 · 건강기능 마케터',
    status: 'available', 
    avatar: 'img/CHANG.jpg',
    specialties: ['부동산', '학원·교육', '창업'],
    bio: '매물 카드·커리큘럼 타임라인 등 정보 구조화 레이아웃 전문.',
    projects: 19,
  },
  {
    name: 'Yunho',
    role: 'B2B SaaS 아키텍트 · 공공 솔루션 전문',
    status: 'rest',
    avatar: 'img/Yunho.jpg',
    specialties: ['멀티테넌트 SaaS 설계', '대용량 트래픽', '공공기관 보안'],
    bio: 'Spring Boot와 Next.js를 기반으로 복잡한 권한 체계...',
    projects: 28
  },

];

const STATUS_LABEL = { available: '작업 가능', busy: '작업 중', rest: '휴식 중' };

function renderDesigners(filter = 'all') {
  const grid = document.getElementById('designerGrid');
  const data = filter === 'all' ? DESIGNERS : DESIGNERS.filter(d => d.status === filter);

  if (!data.length) {
    grid.innerHTML = `<div style="grid-column:1/-1;text-align:center;padding:80px 0;color:#555;font-size:14px;letter-spacing:2px;">해당 상태의 디자이너가 없습니다.</div>`;
    return;
  }

  grid.innerHTML = data.map(d => {
    const avatarEl = d.avatar
      ? `<img src="${d.avatar}" alt="${d.name}">`
      : `<span style="font-size:28px">${d.emoji || '👤'}</span>`;
    const specs = d.specialties.map(s => `<span class="d-spec">${s}</span>`).join('');
    const btnText = d.status === 'available' ? '매칭 문의하기 →' : '대기 신청하기 →';
    return `
      <div class="d-card ${d.status}">
        <div class="d-status">
          <div class="d-status-dot"></div>
          <span class="d-status-text">${STATUS_LABEL[d.status]}</span>
        </div>
        <div class="d-avatar">${avatarEl}</div>
        <div class="d-name">${d.name}</div>
        <div class="d-role">${d.role}</div>
        <div class="d-specs">${specs}</div>
        <p class="d-bio">${d.bio}</p>
        <div class="d-footer">
          <div class="d-projects"><strong>${d.projects}</strong>건 완료</div>
          <button class="d-btn" onclick="openModal(event)">${btnText}</button>
        </div>
      </div>`;
  }).join('');
}

function filterDesigners(filter, btn) {
  document.querySelectorAll('.filter-tab').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderDesigners(filter);
}

window.addEventListener('DOMContentLoaded', () => renderDesigners('all'));
</script>

<div id="modal-container"></div>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/header.js"></script>
<script src="js/main.js"></script>

</body>
</html>
